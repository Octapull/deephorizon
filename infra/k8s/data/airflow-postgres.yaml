# Airflow'un metadata veritabani.
#
# NEDEN KENDI POSTGRES'IMIZ: Airflow Helm chart'i varsayilan olarak Bitnami
# postgresql subchart'ini kurar (postgresql.enabled: true) ama o imaj 2025'te
# Docker Hub'dan kaldirildi -> ImagePullBackOff (apache/airflow#56322, #57328).
# Resmi cozum: postgresql.enabled=false + harici veritabani. Ayrica bu, MLflow'un
# Postgres'iyle ayni deseni kullanmamizi sagliyor (infra/k8s/ml/postgres.yaml).
#
# Servis adi `airflow-postgres` -> airflow-db-credentials icindeki `connection`
# anahtari bu adi kullanir: postgresql+psycopg2://airflow:***@airflow-postgres:5432/airflow
apiVersion: v1
kind: Service
metadata:
  name: airflow-postgres
  labels:
    app: airflow-postgres
spec:
  selector:
    app: airflow-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: airflow-postgres
  labels:
    app: airflow-postgres
spec:
  serviceName: airflow-postgres
  replicas: 1
  selector:
    matchLabels:
      app: airflow-postgres
  template:
    metadata:
      labels:
        app: airflow-postgres
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:17.5-alpine
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: airflow-db-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: airflow-db-credentials
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: airflow-db-credentials
                  key: database
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command:
                - sh
                - -ec
                - exec pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -ec
                - exec pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      terminationGracePeriodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: microk8s-hostpath
        resources:
          requests:
            storage: 10Gi
