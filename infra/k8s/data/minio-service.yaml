# S3 API: cluster ici adres minio.deephorizon-data.svc:9000 (MLflow, DVC, Airflow).
# NodePort 30900: LAN'daki ekip uyeleri icin (mc/boto3) — UFW yalnizca yerel subnet'e acar.
apiVersion: v1
kind: Service
metadata:
  name: minio
  labels:
    app: minio
spec:
  type: NodePort
  selector:
    app: minio
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
      nodePort: 30900
---
# Console: NodePort — UFW disaridan kapatir; erisim SSH tuneliyle:
#   ssh -L 9001:<node-ip>:30901 <kullanici>@<sunucu-ip>  ->  http://localhost:9001
apiVersion: v1
kind: Service
metadata:
  name: minio-console
  labels:
    app: minio
spec:
  type: NodePort
  selector:
    app: minio
  ports:
    - name: console
      port: 9001
      targetPort: 9001
      nodePort: 30901
