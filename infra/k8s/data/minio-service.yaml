# S3 API: cluster ici kullanim (MLflow artifact store, DVC, Airflow).
apiVersion: v1
kind: Service
metadata:
  name: minio
  labels:
    app: minio
spec:
  selector:
    app: minio
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
---
# Console: NodePort — UFW disaridan kapatir; erisim SSH tuneliyle:
#   ssh -L 9001:<node-ip>:30901 <kullanici>@<sunucu-ip>  ->  http://localhost:9001
apiVersion: v1
kind: Service
metadata:
  name: minio-console
  labels:
    app: minio
spec:
  type: NodePort
  selector:
    app: minio
  ports:
    - name: console
      port: 9001
      targetPort: 9001
      nodePort: 30901
