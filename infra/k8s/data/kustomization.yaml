apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: deephorizon-data
resources:
  - namespace.yaml
  - minio-statefulset.yaml
  - minio-service.yaml
  # Airflow'un metadata DB'si. Airflow'un kendisi Helm chart'iyla gelir
  # (infra/k8s/apps/airflow.yaml) — chart'in Bitnami Postgres'i kirik oldugu icin
  # veritabanini biz saglıyoruz.
  - airflow-postgres.yaml
  # Airflow task'larinin yazilabilir calisma alani (git-sync klonu salt-okunur).
  - airflow-workspace-pvc.yaml
