# Source: airflow/templates/configmaps/configmap.yaml
################################
## Airflow ConfigMap
#################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-config
  labels:
    tier: airflow
    component: config
    release: airflow
    chart: "airflow-1.21.0"
    heritage: Helm
data:
  # These are system-specified config overrides.
  airflow.cfg: |-
    [celery]
    flower_url_prefix = 
    sync_parallelism = 0
    worker_concurrency = 16
    
    [celery_kubernetes_executor]
    kubernetes_queue = kubernetes
    
    [core]
    auth_manager = airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    dags_folder = /opt/airflow/dags/repo/pipelines/dags
    execution_api_server_url = http://airflow-api-server:8080/execution/
    executor = LocalExecutor
    load_examples = False
    
    [dag_processor]
    dag_bundle_config_list = [{"classpath":"airflow.dag_processing.bundles.local.LocalDagBundle","kwargs":{},"name":"dags-folder"}]
    
    [elasticsearch]
    json_format = True
    log_id_template = {dag_id}-{task_id}-{run_id}-{map_index}-{try_number}
    
    [elasticsearch_configs]
    max_retries = 3
    retry_timeout = True
    timeout = 30
    
    [fab]
    enable_proxy_fix = True
    
    [kerberos]
    ccache = /var/kerberos-ccache/cache
    keytab = /etc/airflow.keytab
    principal = airflow@FOO.COM
    reinit_frequency = 3600
    
    [kubernetes_executor]
    multi_namespace_mode = False
    namespace = deephorizon-data
    pod_template_file = /opt/airflow/pod_templates/pod_template_file.yaml
    worker_container_repository = apache/airflow
    worker_container_tag = 3.2.0
    
    [logging]
    colored_console_log = False
    remote_logging = False
    
    [metrics]
    statsd_host = airflow-statsd
    statsd_on = False
    statsd_port = 9125
    statsd_prefix = airflow
    
    [scheduler]
    standalone_dag_processor = True
    
    [webserver]
    enable_proxy_fix = True
    
  airflow_local_settings.py: |-
