# Source: airflow/templates/jobs/migrate-database-job.yaml
################################
## Airflow Run Migrations
#################################
apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-run-airflow-migrations
  labels:
    tier: airflow
    component: run-airflow-migrations
    release: airflow
    chart: "airflow-1.21.0"
    heritage: Helm
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        tier: airflow
        component: run-airflow-migrations
        release: airflow
    spec:
      securityContext: 
        
        runAsUser: 50000
        fsGroup: 0
      restartPolicy: OnFailure
      nodeSelector:
        {}
      affinity:
        {}
      tolerations:
        []
      topologySpreadConstraints:
        []
      serviceAccountName: "airflow-migrate-database-job"
      imagePullSecrets:
        []
      containers:
        - name: run-airflow-migrations
          image: apache/airflow:3.2.0
          imagePullPolicy: IfNotPresent
          securityContext: 
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          args:
            - bash
            - -c
            - |-
              exec \
              airflow db migrate
          envFrom:          
            []
          env:          
            # Dynamically created environment variables
            - name: DEEPHORIZON_ROOT
              value: "/opt/airflow/dags/repo"
            - name: MINIO_ENDPOINT
              value: "http://minio.deephorizon-data.svc:9000"
            - name: MINIO_USER
              value: "data-pipeline"
            - name: MINIO_ALIAS
              value: "dh"
            # Dynamically created secret envs
            # Extra env
            - name: PYTHONUNBUFFERED
              value: "1"          
            # Hard Coded Airflow Envs
            - name: AIRFLOW_HOME
              value: /opt/airflow
            - name: AIRFLOW__CORE__FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: airflow-keys
                  key: fernet-key
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: airflow-db-credentials
                  key: connection
            - name: AIRFLOW_CONN_AIRFLOW_DB
              valueFrom:
                secretKeyRef:
                  name: airflow-db-credentials
                  key: connection
            - name: AIRFLOW__API__SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: airflow-keys
                  key: api-secret-key
          resources:
            {}
          volumeMounts:
            - name: config
              mountPath: "/opt/airflow/airflow.cfg"
              subPath: airflow.cfg
              readOnly: true
            - name: config
              mountPath: "/opt/airflow/config/airflow_local_settings.py"
              subPath: airflow_local_settings.py
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: airflow-config
