# Airflow Helm values — render kaynagi. Bu dosya cluster'a UYGULANMAZ.
#
# Argo CD'nin gomulu Helm'i (v3.11.2) Airflow chart >= 1.19.0'i render edemiyor,
# bu yuzden Helm'i biz calistirip ciktiyi repoya koyuyoruz (manifests/).
# Detay ve elenen alternatifler: docs/AIRFLOW.md
#
# YENIDEN RENDER — bu dosyayi degistirdiysen ZORUNLU, yoksa cluster'da hicbir
# sey degismez:
#
#   microk8s helm3 template airflow apache-airflow/airflow \
#     --version 1.21.0 --namespace deephorizon-data \
#     -f infra/k8s/airflow/values.yaml \
#     > infra/k8s/airflow/manifests/airflow.yaml

airflowVersion: "3.2.0"
defaultAirflowTag: "3.2.0"
# Ozel imaj: stok apache/airflow:3.2.0 + ehtim, astropy, mc, dvc[s3],
# great-expectations. DAG task'lari bu araclari cagiriyor; stok imajda yoklar.
# Build: infra/docker/airflow.Dockerfile
# MicroK8s registry addon'una push edildi (localhost:32000).
# Etiket TARIH — `latest` KULLANMA: Kubernetes ayni etiketi yeniden cekmez,
# guncelleme sessizce uygulanmaz. Yeni imaj = yeni tarih etiketi.
images:
  airflow:
    repository: localhost:32000/deephorizon-airflow
    tag: "2026-07-20"

# Tek node — Celery'nin getirdigi Redis + ayri worker pod'lari gereksiz.
executor: LocalExecutor

# DAG'lar bunlari modul seviyesinde okur (os.environ[...]); eksikse import
# edilemez ve UI'de gorunmezler. Parola burada YOK — kod onu runtime'da
# Airflow Variable `minio_data_pipeline_secret`'tan okuyor.
env:
  # YAZILABILIR workspace (git-sync klonu salt-okunur; scriptler data/ altina
  # yaziyor). scheduler.extraInitContainers repoyu buraya klonluyor.
  - name: DEEPHORIZON_ROOT
    value: /opt/airflow/workspace
  - name: MINIO_ENDPOINT
    value: http://minio.deephorizon-data.svc:9000
  - name: MINIO_USER
    value: data-pipeline
  - name: MINIO_ALIAS
    value: dh
  # DAG'lar pipelines/plugins/deephorizon_utils.py'yi import ediyor; o klasoru yola ekler.
  - name: PYTHONPATH
    value: /opt/airflow/dags/repo/pipelines/plugins

# Chart'in Bitnami Postgres'i kullanilmiyor (imaji Docker Hub'dan kaldirildi).
# Yerine: infra/k8s/data/airflow-postgres.yaml
postgresql:
  enabled: false
data:
  metadataSecretName: airflow-db-credentials

# Helm hook'lari KAPALI — Argo CD ile birlikte kilitlenme yaratiyorlar:
# chart varsayilani `helm.sh/hook: post-install` -> Argo CD bunu PostSync sayar
# ("her sey saglikli olunca calistir"), ama pod'larin init container'i
# migration'i bekledigi icin hicbir sey saglikli olmuyor -> job hic olusmuyor.
# false: Job'lar normal kaynak olur, Argo CD hepsini ayni anda uygular,
# migration kosar, init container'lar beklemeyi birakir.
migrateDatabaseJob:
  useHelmHooks: false
  # TTL kapali: yoksa Argo CD ile 5 dk'da bir job yeniden olusma dongusu.
  ttlSecondsAfterFinished: ~

# Varsayilan admin kullanicisi KAPALI. Chart onu `-u admin -p admin` seklinde
# job argumanina duz metin yaziyor; bu repo public oldugu icin parola GitHub'da
# herkese acik olurdu. Kullanici elle, kasadaki guclu parolayla olusturuluyor:
#   kubectl exec -n deephorizon-data deploy/airflow-api-server -- \
#     airflow users create -r Admin -u admin -e <mail> -f admin -l user -p '<parola>'
createUserJob:
  enabled: false
  useHelmHooks: false

# LocalExecutor kullaniyoruz; Redis'e ihtiyac yok. Kapatilmazsa chart iki
# kullanilmayan secret (airflow-redis-password, airflow-broker-url) uretiyor ve
# iclerindeki uretilmis parola render ciktisiyla repoya girmis oluyor.
redis:
  enabled: false

# LocalExecutor'da task'lar scheduler pod'unda kosar; yazilabilir workspace
# buraya baglanir. (git-sync ayni pod'a DAG'lari salt-okunur getirmeye devam eder.)
scheduler:
  # PVC'yi /opt/airflow/workspace'e bagla (DEEPHORIZON_ROOT bunu gosteriyor).
  extraVolumes:
    - name: workspace
      persistentVolumeClaim:
        claimName: airflow-workspace
  extraVolumeMounts:
    - name: workspace
      mountPath: /opt/airflow/workspace
  # Pod her basladiginda workspace'i repoyla doldurur/gunceller. Ilk seferde
  # klonlar, sonra ff-only pull yapar. Boylece scriptler + data + .dvc ayni
  # yazilabilir kokte olur. Ozel imaj git ve araclari icerir.
  extraInitContainers:
    - name: workspace-clone
      image: localhost:32000/deephorizon-airflow:2026-07-20
      command:
        - bash
        - -ec
        - |
          REPO=https://github.com/Octapull/deephorizon.git
          DST=/opt/airflow/workspace
          # PVC root sahipliginde gelir, git uid 50000 ile kosar -> "dubious
          # ownership". safe.directory'yi her komuta -c ile gomuyoruz (global
          # config dosyasina guvenmek yerine, kursun gecirmez).
          SAFE="-c safe.directory=*"
          if [ -d "$DST/.git" ]; then
            git $SAFE -C "$DST" fetch --depth 1 origin main
            git $SAFE -C "$DST" reset --hard origin/main
          else
            git $SAFE clone --depth 1 "$REPO" "$DST"
          fi
          echo "workspace hazir: $(git $SAFE -C "$DST" rev-parse --short HEAD)"
      volumeMounts:
        - name: workspace
          mountPath: /opt/airflow/workspace

# Bos birakilirsa chart uretir ve her render'da degistirir; fernet-key degisirse
# DB'deki sifreli Variable/Connection'lar kalici olarak okunamaz olur.
fernetKeySecretName: airflow-keys
apiSecretKeySecretName: airflow-keys
jwtSecretName: airflow-keys

# git push = DAG deploy. Klon repo'nun tamamini icerir, DAG'lar scripts/ altini
# da cagirabilir; subPath yalnizca Airflow'a dags klasorunu gosterir.
dags:
  gitSync:
    enabled: true
    repo: https://github.com/Octapull/deephorizon.git
    branch: main
    rev: HEAD
    ref: main
    depth: 1
    maxFailures: 0
    subPath: pipelines/dags

# Airflow 3'te UI'yi api-server sunuyor. 30800: MinIO 30900/30901 ve MLflow
# 30500 ile cakismaz; UFW yalnizca yerel subnet'e acar.
apiServer:
  service:
    type: NodePort
    ports:
      - name: api-server
        port: 8080
        nodePort: 30800

# Prometheus/Grafana henuz yok.
statsd:
  enabled: false
