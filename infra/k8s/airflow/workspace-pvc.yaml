# Airflow task'lari icin YAZILABILIR calisma alani.
#
# NEDEN: DAG'lar veriyi DEEPHORIZON_ROOT/data altina uretiyor ve scriptler cikti
# yolunu kendi konumundan turetiyor (Path(__file__).parent.parent / "data").
# git-sync klonu (/opt/airflow/dags/repo) SALT-OKUNUR -> oraya yazilamaz.
# Bu PVC yazilabilir bir workspace saglar; DEEPHORIZON_ROOT buna cevrilir
# (values.yaml env). Init container repoyu buraya klonlar, boylece scriptler +
# data + .dvc ayni yazilabilir kokte bulunur — Data squad'in kod degisikligi
# GEREKMEZ.
#
# 50Gi: training seti ~20 GiB + DVC cache verinin kopyasi (~20 GiB). Bu bir
# scratch alani — veri MinIO'ya yuklenince temizlenebilir, kalici depo MinIO'dur.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-workspace
  labels:
    app: airflow
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: microk8s-hostpath
  resources:
    requests:
      storage: 50Gi
