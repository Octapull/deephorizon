# Airflow — resmi Helm chart'i, Argo CD uzerinden.
#
# Chart 1.21.0 SECILDI, 1.22.0 DEGIL: 1.22.0 "minimum Helm 3.19" sarti koyuyor,
# Argo CD repo-server'inin gomulu Helm'i v3.11.2 -> render edemez. 1.21.0 ayni
# Airflow surumunu (3.2.0) tasiyor ve Helm sarti koymuyor.
#
# Values ayri dosyada degil, burada inline: Argo CD 2.7'de multi-source (chart bir
# kaynaktan, values baskasindan) beta ve kirilgan. Tek kaynak + inline values her
# surumde calisir ve neyin deploy edilecegi tek dosyada gorunur.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airflow
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://airflow.apache.org
    chart: airflow
    targetRevision: 1.21.0
    helm:
      values: |
        # --- Surum (imaj pinli) ---
        airflowVersion: "3.2.0"
        defaultAirflowTag: "3.2.0"
        images:
          airflow:
            repository: apache/airflow
            tag: "3.2.0"

        # --- Executor ---
        # Chart varsayilani CeleryExecutor; o Redis + ayri worker pod'lari getirir.
        # Tek node'da kazanci yok -> LocalExecutor (task'lar scheduler icinde kosar).
        executor: LocalExecutor

        # --- DAG'larin bekledigi ortam degiskenleri (KONTRAT) ---
        # pipelines/dags/*.py bunlari MODUL SEVIYESINDE okur (os.environ[...]).
        # Eksikse DAG import edilemez, UI'de "Import Error" cikar. Bu yuzden
        # chart'in top-level `env:`'i ile TUM airflow container'larina veriliyor
        # (scheduler, dag-processor, api-server, worker).
        #
        # NOT (Faz 1): DAG'larin GORUNMESI icin bu degiskenlerin sadece VAR olmasi
        # yeter — degerlerin dogrulugu task CALISIRKEN (Faz 2) onemli.
        # MINIO_SECRET burada YOK: kod onu runtime'da okuyor; parola Airflow
        # Variable `minio_data_pipeline_secret` ile gelecek (daha guvenli).
        env:
          # git-sync repoyu buraya klonlar; scripts/ ve data/ bunun altinda.
          # Faz 1'de parse icin yeterli; Faz 2'de yazilabilir PVC ile guncellenecek.
          - name: DEEPHORIZON_ROOT
            value: /opt/airflow/dags/repo
          # Cluster-ici MinIO adresi (NodePort degil — hairpin'i onler).
          - name: MINIO_ENDPOINT
            value: http://minio.deephorizon-data.svc:9000
          - name: MINIO_USER
            value: data-pipeline
          - name: MINIO_ALIAS
            value: dh

        # --- Veritabani ---
        # Bitnami imaji kaldirildi (bkz. infra/k8s/data/airflow-postgres.yaml).
        postgresql:
          enabled: false
        data:
          metadataSecretName: airflow-db-credentials

        # --- Anahtarlar ---
        # Bos birakilirsa chart uretir ve HER helm upgrade'inde DEGISTIRIR:
        #   fernet-key degisirse -> DB'deki tum sifreli Connection/Variable'lar
        #                           kalici olarak okunamaz olur
        #   api-secret-key       -> herkes oturumdan atilir
        #   jwt-secret           -> calisan DAG'lar kirilir
        # Ucu de SealedSecret'ta sabit (infra/k8s/secrets/airflow-keys.yaml).
        # NOT: webserverSecretKey* Airflow 2'ye ait, 3+ icin apiSecretKey* kullanilir.
        fernetKeySecretName: airflow-keys
        apiSecretKeySecretName: airflow-keys
        jwtSecretName: airflow-keys

        # --- DAG teslimi ---
        # git-sync repoyu klonlar ve senkron tutar: `git push` = DAG deploy.
        # Repo public oldugu icin credential gerekmiyor.
        # subPath yalnizca Airflow'un dags klasorunu isaret eder; klon repo'nun
        # TAMAMINI icerir, boylece DAG'lar scripts/ altini da cagirabilir.
        dags:
          gitSync:
            enabled: true
            repo: https://github.com/Octapull/deephorizon.git
            branch: main
            rev: HEAD
            ref: main
            depth: 1
            maxFailures: 0
            subPath: pipelines/dags

        # --- UI ---
        # Airflow 3'te UI'yi api-server suniyor (webserver: bloku Airflow 2 kalintisi).
        # NodePort 30800 — MinIO 30900/30901 ve MLflow 30500 ile cakismaz.
        # UFW yalnizca yerel subnet'e acar.
        apiServer:
          service:
            type: NodePort
            ports:
              - name: api-server
                port: 8080
                nodePort: 30800

        # --- Kapatilanlar ---
        # StatsD metrik toplayicisi: Prometheus/Grafana henuz yok, bos pod calismasin.
        statsd:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: deephorizon-data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
