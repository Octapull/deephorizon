# Secret YAML dosyalari Git disinda tutulur. Bu Application servis bazli bos
# klasorleri izler; prune kapali oldugu icin cluster'daki mevcut Secret kaynaklari
# Git'teki dosya yoklugundan etkilenmez.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Octapull/deephorizon.git
    targetRevision: main
    path: infra/k8s/secrets
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      # Secret manifestleri Git disinda tutuldugunda mevcut cluster Secret'larini koru.
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
