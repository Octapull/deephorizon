# SealedSecret manifestleri: infra/k8s/secrets/ altindaki YAML'lari izler.
# Her SealedSecret kendi namespace'ini metadata'sinda tasir; sifreleme namespace'e
# scope'lu oldugundan seal'lerken -n <namespace> vermek zorunludur (bkz. docs/DEVOPS.md).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Octapull/deephorizon.git
    targetRevision: main
    path: infra/k8s/secrets
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      # Secret manifestleri Git disinda tutuldugunda mevcut cluster Secret'larini koru.
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
