# MinIO Application: infra/k8s/minio/ altindaki kustomize kaynagini izler.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Octapull/deephorizon.git
    targetRevision: main
    path: infra/k8s/minio
  destination:
    server: https://kubernetes.default.svc
    namespace: deephorizon-data
  syncPolicy:
    automated:
      # Technology-based directory migration temporarily moves resources to
      # separate Argo CD Applications. Keep existing workloads during adoption.
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
